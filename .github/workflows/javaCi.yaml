on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3  # Lấy code về
      - uses: actions/setup-java@v3 # Cài JDK
        with:
          java-version: '25'
          distribution: 'temurin'
      - run: mvn package # Chạy lệnh build
      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: my-app-jar
          path: target/*.jar